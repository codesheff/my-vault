apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: vault
data:
  vault.hcl: |
    ui = true

    listener "tcp" {
      address         = "0.0.0.0:8200"
      tls_disable     = 1
      cluster_address = "0.0.0.0:8201"
    }

    storage "raft" {
      path    = "/vault/data"
      node_id = "vault-node-1"
    }

    # api_addr must be reachable from clients inside the cluster.
    api_addr     = "http://vault.vault.svc.cluster.local:8200"
    # cluster_addr uses the stable pod DNS provided by the StatefulSet headless service.
    cluster_addr = "http://vault-0.vault-headless.vault.svc.cluster.local:8201"
