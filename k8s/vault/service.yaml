# ClusterIP service — used by in-cluster clients (devpod) via DNS: vault.vault.svc.cluster.local:8200
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  type: NodePort
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
      nodePort: 32200   # fixed NodePort for predictable host access; change if 32200 is taken
---
# Headless service required by the StatefulSet for stable pod DNS (vault-0.vault-headless.vault.svc.cluster.local)
apiVersion: v1
kind: Service
metadata:
  name: vault-headless
  namespace: vault
spec:
  clusterIP: None
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
